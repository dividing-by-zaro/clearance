name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    env:
      APP_NAME: Clearance
      PROJECT_FILE: Clearance.xcodeproj
      SCHEME: Clearance
      DERIVED_DATA_PATH: ${{ github.workspace }}/build
      ARTIFACTS_DIR: ${{ github.workspace }}/dist
      SPARKLE_FEED_URL: https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: brew install xcodegen

      - name: Setup Signing Keychain
        env:
          DEVELOPER_ID_APPLICATION_CERT_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          DEVELOPER_ID_APPLICATION_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"

          echo "$DEVELOPER_ID_APPLICATION_CERT_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$RUNNER_TEMP" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$RUNNER_TEMP" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$DEVELOPER_ID_APPLICATION_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$RUNNER_TEMP" "$KEYCHAIN_PATH"

      - name: Build Release App
        id: build
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          set -euo pipefail

          xcodegen generate
          xcodebuild \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            SPARKLE_FEED_URL="$SPARKLE_FEED_URL" \
            SPARKLE_PUBLIC_ED_KEY="$SPARKLE_PUBLIC_ED_KEY" \
            clean build

          APP_PATH="$DERIVED_DATA_PATH/Build/Products/Release/$APP_NAME.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle not found at $APP_PATH"
            exit 1
          fi

          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Codesign App Bundle
        env:
          DEVELOPER_ID_APPLICATION_SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          APP_PATH="${{ steps.build.outputs.app_path }}"

          while IFS= read -r component; do
            codesign --force --timestamp --options runtime --sign "$DEVELOPER_ID_APPLICATION_SIGNING_IDENTITY" "$component"
          done < <(
            find "$APP_PATH/Contents/Frameworks" \
              \( -name "*.framework" -o -name "*.dylib" -o -name "*.xpc" -o -name "*.bundle" \) \
              -print \
              | awk '{ print length($0) " " $0 }' \
              | sort -rn \
              | cut -d' ' -f2-
          )

          codesign --force --timestamp --options runtime --sign "$DEVELOPER_ID_APPLICATION_SIGNING_IDENTITY" "$APP_PATH/Contents/MacOS/$APP_NAME"
          codesign --force --timestamp --options runtime --sign "$DEVELOPER_ID_APPLICATION_SIGNING_IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type execute --verbose "$APP_PATH" || true

      - name: Notarize and Package
        id: notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          APP_PATH="${{ steps.build.outputs.app_path }}"
          mkdir -p "$ARTIFACTS_DIR"

          NOTARY_ZIP="$RUNNER_TEMP/$APP_NAME-notary.zip"
          APP_ZIP="$ARTIFACTS_DIR/$APP_NAME-$VERSION-macOS.zip"

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$NOTARY_ZIP"
          xcrun notarytool submit "$NOTARY_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$APP_ZIP"

          echo "app_zip=$APP_ZIP" >> "$GITHUB_OUTPUT"

      - name: Build Sparkle Appcast Tool
        run: |
          set -euo pipefail

          SPARKLE_SOURCE="$RUNNER_TEMP/Sparkle"
          SPARKLE_BUILD="$RUNNER_TEMP/sparkle-build"

          git clone --depth 1 https://github.com/sparkle-project/Sparkle.git "$SPARKLE_SOURCE"
          xcodebuild \
            -project "$SPARKLE_SOURCE/Sparkle.xcodeproj" \
            -scheme generate_appcast \
            -configuration Release \
            -derivedDataPath "$SPARKLE_BUILD" \
            build

      - name: Generate Sparkle Appcast
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          set -euo pipefail

          SPARKLE_BUILD="$RUNNER_TEMP/sparkle-build"
          GENERATE_APPCAST="$SPARKLE_BUILD/Build/Products/Release/generate_appcast"
          APPCAST_DIR="$RUNNER_TEMP/appcast"
          ED_KEY_FILE="$RUNNER_TEMP/sparkle-private-key"

          mkdir -p "$APPCAST_DIR"
          cp "${{ steps.notarize.outputs.app_zip }}" "$APPCAST_DIR/"
          printf '%s' "$SPARKLE_PRIVATE_ED_KEY" > "$ED_KEY_FILE"

          "$GENERATE_APPCAST" "$APPCAST_DIR" \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}" \
            --ed-key-file "$ED_KEY_FILE"

          cp "$APPCAST_DIR/appcast.xml" "$ARTIFACTS_DIR/appcast.xml"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.notarize.outputs.app_zip }}
            ${{ env.ARTIFACTS_DIR }}/appcast.xml
          generate_release_notes: true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clearance-${{ github.ref_name }}
          path: |
            ${{ steps.notarize.outputs.app_zip }}
            ${{ env.ARTIFACTS_DIR }}/appcast.xml

      - name: Cleanup Keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
